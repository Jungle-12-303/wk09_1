<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" style="background:#fff">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; }
      .title { font-size: 20px; font-weight: bold; fill: #222; }
      .label { font-size: 14px; fill: #333; }
      .phase { font-size: 12px; font-weight: bold; }
      .small { font-size: 11px; fill: #666; }
    </style>
  </defs>
  <text x="450" y="35" text-anchor="middle" class="title">Pintos Project 1 - 전체 아키텍처</text>

  <!-- timer.c -->
  <rect x="50" y="80" width="220" height="140" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="160" y="110" text-anchor="middle" class="label" font-weight="bold">timer.c</text>
  <line x1="70" y1="120" x2="250" y2="120" stroke="#1565C0" stroke-width="1"/>
  <text x="160" y="142" text-anchor="middle" class="small">timer_sleep()</text>
  <text x="160" y="160" text-anchor="middle" class="small">timer_interrupt()</text>
  <text x="160" y="178" text-anchor="middle" class="small">thread_awake()</text>
  <text x="160" y="200" text-anchor="middle" class="phase" fill="#1565C0">[Phase 1] Alarm Clock</text>

  <!-- thread.c -->
  <rect x="340" y="80" width="220" height="140" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" class="label" font-weight="bold">thread.c</text>
  <line x1="360" y1="120" x2="540" y2="120" stroke="#2E7D32" stroke-width="1"/>
  <text x="450" y="142" text-anchor="middle" class="small">thread_create()</text>
  <text x="450" y="160" text-anchor="middle" class="small">thread_unblock()</text>
  <text x="450" y="178" text-anchor="middle" class="small">next_thread_to_run()</text>
  <text x="450" y="200" text-anchor="middle" class="phase" fill="#2E7D32">[Phase 2] Priority Sched</text>

  <!-- synch.c -->
  <rect x="630" y="80" width="220" height="140" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="740" y="110" text-anchor="middle" class="label" font-weight="bold">synch.c</text>
  <line x1="650" y1="120" x2="830" y2="120" stroke="#E65100" stroke-width="1"/>
  <text x="740" y="142" text-anchor="middle" class="small">lock_acquire()</text>
  <text x="740" y="160" text-anchor="middle" class="small">lock_release()</text>
  <text x="740" y="178" text-anchor="middle" class="small">sema_up() / sema_down()</text>
  <text x="740" y="200" text-anchor="middle" class="phase" fill="#E65100">[Phase 3] Priority Donation</text>

  <!-- Arrows -->
  <line x1="270" y1="150" x2="335" y2="150" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="302" y="142" text-anchor="middle" class="small">호출</text>

  <line x1="560" y1="150" x2="625" y2="150" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="592" y="142" text-anchor="middle" class="small">호출</text>

  <!-- Phase 4 spanning -->
  <rect x="50" y="280" width="800" height="90" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="450" y="310" text-anchor="middle" class="label" font-weight="bold">[Phase 4] MLFQS - 다중 레벨 피드백 큐 스케줄러</text>
  <text x="450" y="335" text-anchor="middle" class="small">timer.c: timer_interrupt에서 recent_cpu, load_avg, priority 재계산</text>
  <text x="450" y="355" text-anchor="middle" class="small">thread.c: mlfqs_priority(), mlfqs_recent_cpu(), mlfqs_load_avg() 추가</text>

  <!-- Vertical arrows from boxes to Phase 4 -->
  <line x1="160" y1="220" x2="160" y2="275" stroke="#7B1FA2" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="450" y1="220" x2="450" y2="275" stroke="#7B1FA2" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="50" y="410" width="800" height="70" rx="6" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="70" y="435" class="small" font-weight="bold">범례:</text>
  <rect x="120" y="422" width="14" height="14" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="140" y="435" class="small">Phase 1</text>
  <rect x="200" y="422" width="14" height="14" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="220" y="435" class="small">Phase 2</text>
  <rect x="300" y="422" width="14" height="14" fill="#FFF3E0" stroke="#E65100"/>
  <text x="320" y="435" class="small">Phase 3</text>
  <rect x="400" y="422" width="14" height="14" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="420" y="435" class="small">Phase 4</text>
  <text x="70" y="465" class="small">실선 화살표: 함수 호출 관계  /  점선 화살표: Phase 4에서 수정</text>
</svg>