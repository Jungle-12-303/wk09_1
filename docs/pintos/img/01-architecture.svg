<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780"
     font-family="'Inter', 'JetBrains Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <style>
    .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
  </style>
  <rect width="1200" height="780" fill="#FFFFFF"/>
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CBD5E1"/>
    </marker>
  </defs>
  <text x="600" y="56" text-anchor="middle" font-size="28" font-weight="bold" fill="#191F28">Pintos Project 1 -- 모듈 구조</text>
  <rect x="80" y="100" width="320" height="240" rx="16" fill="#FFFFFF" stroke="#F2F4F6" stroke-width="1" filter="url(#shadow)"/>
  <text x="240" y="140" font-size="20" fill="#191F28" text-anchor="middle" font-weight="bold">timer.c</text>
  <rect x="110" y="155" width="80" height="24" rx="12" fill="#EFF6FF"/>
  <text x="150" y="171" font-size="12" fill="#1D4ED8" text-anchor="middle" font-weight="bold">Phase 1</text>
  <line x1="100" y1="190" x2="380" y2="190" stroke="#F2F4F6" stroke-width="1"/>
  <text x="110" y="220" font-size="14" fill="#333D4B" text-anchor="start" font-weight="normal" class="mono">timer_sleep()</text>
  <text x="110" y="248" font-size="14" fill="#333D4B" text-anchor="start" font-weight="normal" class="mono">timer_interrupt()</text>
  <text x="110" y="276" font-size="14" fill="#333D4B" text-anchor="start" font-weight="normal" class="mono">thread_awake()</text>
  <rect x="440" y="100" width="320" height="240" rx="16" fill="#FFFFFF" stroke="#F2F4F6" stroke-width="1" filter="url(#shadow)"/>
  <text x="600" y="140" font-size="20" fill="#191F28" text-anchor="middle" font-weight="bold">thread.c</text>
  <rect x="470" y="155" width="80" height="24" rx="12" fill="#F0FDF4"/>
  <text x="510" y="171" font-size="12" fill="#15803D" text-anchor="middle" font-weight="bold">Phase 2</text>
  <line x1="460" y1="190" x2="740" y2="190" stroke="#F2F4F6" stroke-width="1"/>
  <text x="470" y="220" font-size="14" fill="#333D4B" text-anchor="start" font-weight="normal" class="mono">thread_create()</text>
  <text x="470" y="248" font-size="14" fill="#333D4B" text-anchor="start" font-weight="normal" class="mono">thread_unblock()</text>
  <text x="470" y="276" font-size="14" fill="#333D4B" text-anchor="start" font-weight="normal" class="mono">thread_yield()</text>
  <text x="470" y="304" font-size="14" fill="#333D4B" text-anchor="start" font-weight="normal" class="mono">schedule()</text>
  <rect x="800" y="100" width="320" height="240" rx="16" fill="#FFFFFF" stroke="#F2F4F6" stroke-width="1" filter="url(#shadow)"/>
  <text x="960" y="140" font-size="20" fill="#191F28" text-anchor="middle" font-weight="bold">synch.c</text>
  <rect x="830" y="155" width="80" height="24" rx="12" fill="#FFF7ED"/>
  <text x="870" y="171" font-size="12" fill="#C2410C" text-anchor="middle" font-weight="bold">Phase 3</text>
  <line x1="820" y1="190" x2="1100" y2="190" stroke="#F2F4F6" stroke-width="1"/>
  <text x="830" y="220" font-size="14" fill="#333D4B" text-anchor="start" font-weight="normal" class="mono">lock_acquire()</text>
  <text x="830" y="248" font-size="14" fill="#333D4B" text-anchor="start" font-weight="normal" class="mono">lock_release()</text>
  <text x="830" y="276" font-size="14" fill="#333D4B" text-anchor="start" font-weight="normal" class="mono">sema_down()</text>
  <text x="830" y="304" font-size="14" fill="#333D4B" text-anchor="start" font-weight="normal" class="mono">sema_up()</text>
  <path d="M 400,220 Q 416,210 432,220" fill="none" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="420" y="208" font-size="14" fill="#8B95A1" text-anchor="middle" font-weight="normal">호출</text>
  <path d="M 760,220 Q 776,210 792,220" fill="none" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="780" y="208" font-size="14" fill="#8B95A1" text-anchor="middle" font-weight="normal">호출</text>
  <rect x="80" y="400" width="1040" height="160" rx="16" fill="#FFFFFF" stroke="#F2F4F6" stroke-width="1" filter="url(#shadow)"/>
  <rect x="110" y="420" width="80" height="24" rx="12" fill="#FAF5FF"/>
  <text x="150" y="436" font-size="12" fill="#7E22CE" text-anchor="middle" font-weight="bold">Phase 4</text>
  <text x="202" y="436" font-size="20" fill="#191F28" text-anchor="start" font-weight="bold">MLFQS</text>
  <text x="110" y="474" font-size="16" fill="#333D4B" text-anchor="start" font-weight="normal">timer.c, thread.c, synch.c 세 모듈에 걸쳐 변경 사항 발생</text>
  <text x="110" y="504" font-size="14" fill="#8B95A1" text-anchor="start" font-weight="normal">nice, recent_cpu, load_avg 기반 우선순위 자동 계산 / priority donation 비활성화</text>
  <text x="110" y="532" font-size="14" fill="#8B95A1" text-anchor="start" font-weight="normal">매 틱: recent_cpu++ / 매 초: load_avg, recent_cpu 재계산 / 매 4틱: priority 재계산</text>
  <rect x="80" y="630" width="80" height="24" rx="12" fill="#EFF6FF"/>
  <text x="120" y="646" font-size="12" fill="#1D4ED8" text-anchor="middle" font-weight="bold">Phase 1</text>
  <rect x="180" y="630" width="80" height="24" rx="12" fill="#F0FDF4"/>
  <text x="220" y="646" font-size="12" fill="#15803D" text-anchor="middle" font-weight="bold">Phase 2</text>
  <rect x="280" y="630" width="80" height="24" rx="12" fill="#FFF7ED"/>
  <text x="320" y="646" font-size="12" fill="#C2410C" text-anchor="middle" font-weight="bold">Phase 3</text>
  <rect x="380" y="630" width="80" height="24" rx="12" fill="#FAF5FF"/>
  <text x="420" y="646" font-size="12" fill="#7E22CE" text-anchor="middle" font-weight="bold">Phase 4</text>
</svg>
