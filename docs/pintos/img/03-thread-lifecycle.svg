<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="850" viewBox="0 0 1200 850"
     font-family="system-ui, -apple-system, sans-serif">
  <rect width="1200" height="850" fill="#FFFFFF"/>
  <text x="600" y="52" text-anchor="middle" font-size="32" font-weight="bold" fill="#191F28">스레드 생명 주기</text>
  <defs>
    <marker id="arr_lc" markerWidth="16" markerHeight="11" refX="14" refY="5.5" orient="auto">
      <polygon points="0 0, 16 5.5, 0 11" fill="#4E5968" />
    </marker>
  </defs>
  <rect x="43" y="353" width="220" height="100" rx="20" fill="#F2F4F6" />
  <rect x="40" y="350" width="220" height="100" rx="20" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" />
  <text x="150" y="408" font-size="22" fill="#1D4ED8" text-anchor="middle" font-weight="bold">BLOCKED</text>
  <rect x="393" y="153" width="220" height="100" rx="20" fill="#F2F4F6" />
  <rect x="390" y="150" width="220" height="100" rx="20" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" />
  <text x="500" y="208" font-size="22" fill="#15803D" text-anchor="middle" font-weight="bold">READY</text>
  <rect x="743" y="353" width="220" height="100" rx="20" fill="#F2F4F6" />
  <rect x="740" y="350" width="220" height="100" rx="20" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" />
  <text x="850" y="408" font-size="22" fill="#15803D" text-anchor="middle" font-weight="bold">RUNNING</text>
  <rect x="393" y="603" width="220" height="100" rx="20" fill="#F2F4F6" />
  <rect x="390" y="600" width="220" height="100" rx="20" fill="#FAF5FF" stroke="#A855F7" stroke-width="2" />
  <text x="500" y="658" font-size="22" fill="#7E22CE" text-anchor="middle" font-weight="bold">DYING</text>
  <line x1="260" y1="350" x2="390" y2="250" stroke="#4E5968" stroke-width="2" marker-end="url(#arr_lc)" />
  <text x="285" y="280" font-size="15" fill="#4E5968" text-anchor="start" font-weight="normal">thread_unblock()</text>
  <text x="285" y="302" font-size="15" fill="#4E5968" text-anchor="start" font-weight="normal">sema_up()</text>
  <rect x="265" y="308" width="80" height="22" rx="11" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1" />
  <text x="305" y="324" font-size="12" fill="#1D4ED8" text-anchor="middle" font-weight="normal">Phase 1</text>
  <line x1="740" y1="350" x2="740" y2="350" stroke="#4E5968" stroke-width="2" marker-end="url(#arr_lc)" />
  <line x1="610" y1="250" x2="740" y2="350" stroke="#4E5968" stroke-width="2" marker-end="url(#arr_lc)" />
  <text x="705" y="310" font-size="15" fill="#4E5968" text-anchor="start" font-weight="normal">schedule()</text>
  <rect x="695" y="316" width="80" height="22" rx="11" fill="#F0FDF4" stroke="#22C55E" stroke-width="1" />
  <text x="735" y="332" font-size="12" fill="#15803D" text-anchor="middle" font-weight="normal">Phase 2</text>
  <line x1="740" y1="350" x2="260" y2="350" stroke="#4E5968" stroke-width="2" marker-end="url(#arr_lc)" />
  <text x="480" y="340" font-size="15" fill="#4E5968" text-anchor="start" font-weight="normal">sema_down()</text>
  <text x="480" y="360" font-size="15" fill="#4E5968" text-anchor="start" font-weight="normal">lock_acquire()</text>
  <rect x="470" y="366" width="80" height="22" rx="11" fill="#FFF7ED" stroke="#F97316" stroke-width="1" />
  <text x="510" y="382" font-size="12" fill="#C2410C" text-anchor="middle" font-weight="normal">Phase 3</text>
  <path d="M 790,350 C 790,200 560,400 560,250" fill="none" stroke="#4E5968" stroke-width="2" marker-end="url(#arr_lc)" />
  <text x="830" y="240" font-size="15" fill="#4E5968" text-anchor="start" font-weight="normal">thread_yield()</text>
  <rect x="820" y="248" width="80" height="22" rx="11" fill="#F0FDF4" stroke="#22C55E" stroke-width="1" />
  <text x="860" y="264" font-size="12" fill="#15803D" text-anchor="middle" font-weight="normal">Phase 2</text>
  <line x1="850" y1="450" x2="500" y2="600" stroke="#4E5968" stroke-width="2" marker-end="url(#arr_lc)" />
  <text x="695" y="525" font-size="15" fill="#4E5968" text-anchor="start" font-weight="normal">thread_exit()</text>
  <line x1="350" y1="120" x2="460" y2="160" stroke="#4E5968" stroke-width="2" marker-end="url(#arr_lc)" />
  <text x="320" y="110" font-size="15" fill="#4E5968" text-anchor="start" font-weight="normal">thread_create()</text>
</svg>
