<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="800" viewBox="0 0 1200 800"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="800" fill="#FFFFFF"/>
  <text x="600" y="52" text-anchor="middle"
        font-size="32" font-weight="bold" fill="#191F28">
    스레드 생명 주기
  </text>
  <defs>
    <marker id="arr" markerWidth="16" markerHeight="11"
            refX="14" refY="5.5" orient="auto">
      <polygon points="0 0, 16 5.5, 0 11" fill="#4E5968" />
    </marker>
  </defs>
  <rect x="73" y="373" width="220" height="100" rx="20" fill="#F2F4F6" />
  <rect x="70" y="370" width="220" height="100" rx="20" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" />
  <text x="180" y="428" font-size="22" fill="#1D4ED8" text-anchor="middle" font-weight="bold">BLOCKED</text>
  <rect x="493" y="133" width="220" height="100" rx="20" fill="#F2F4F6" />
  <rect x="490" y="130" width="220" height="100" rx="20" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" />
  <text x="600" y="188" font-size="22" fill="#15803D" text-anchor="middle" font-weight="bold">READY</text>
  <rect x="913" y="373" width="220" height="100" rx="20" fill="#F2F4F6" />
  <rect x="910" y="370" width="220" height="100" rx="20" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" />
  <text x="1020" y="428" font-size="22" fill="#15803D" text-anchor="middle" font-weight="bold">RUNNING</text>
  <rect x="493" y="613" width="220" height="100" rx="20" fill="#F2F4F6" />
  <rect x="490" y="610" width="220" height="100" rx="20" fill="#FAF5FF" stroke="#A855F7" stroke-width="2" />
  <text x="600" y="668" font-size="22" fill="#7E22CE" text-anchor="middle" font-weight="bold">DYING</text>
  <line x1="380" y1="100" x2="500" y2="145" stroke="#4E5968" stroke-width="2" marker-end="url(#arr)" />
  <text x="350" y="95" font-size="15" fill="#4E5968" text-anchor="start" font-weight="normal">thread_create()</text>
  <line x1="290" y1="385" x2="490" y2="215" stroke="#4E5968" stroke-width="2" marker-end="url(#arr)" />
  <text x="310" y="285" font-size="15" fill="#4E5968" text-anchor="start" font-weight="normal">thread_unblock()</text>
  <text x="310" y="308" font-size="15" fill="#4E5968" text-anchor="start" font-weight="normal">sema_up()</text>
  <rect x="270" y="315" width="80" height="26" rx="13" fill="#3B82F6" />
  <text x="310" y="333" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Phase 1</text>
  <line x1="710" y1="215" x2="910" y2="385" stroke="#4E5968" stroke-width="2" marker-end="url(#arr)" />
  <text x="825" y="295" font-size="15" fill="#4E5968" text-anchor="start" font-weight="normal">schedule()</text>
  <rect x="785" y="305" width="80" height="26" rx="13" fill="#22C55E" />
  <text x="825" y="323" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Phase 2</text>
  <path d="M 910,415 C 700,505 400,505 290,415" fill="none" stroke="#4E5968" stroke-width="2" marker-end="url(#arr)" />
  <text x="550" y="530" font-size="15" fill="#4E5968" text-anchor="start" font-weight="normal">sema_down() / lock_acquire()</text>
  <rect x="510" y="540" width="80" height="26" rx="13" fill="#F97316" />
  <text x="550" y="558" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Phase 3</text>
  <path d="M 910,365 C 900,180 750,130 710,175" fill="none" stroke="#4E5968" stroke-width="2" marker-end="url(#arr)" />
  <text x="830" y="135" font-size="15" fill="#4E5968" text-anchor="start" font-weight="normal">thread_yield()</text>
  <rect x="790" y="145" width="80" height="26" rx="13" fill="#22C55E" />
  <text x="830" y="163" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Phase 2</text>
  <line x1="1020" y1="475" x2="730" y2="635" stroke="#4E5968" stroke-width="2" marker-end="url(#arr)" />
  <text x="850" y="600" font-size="15" fill="#4E5968" text-anchor="start" font-weight="normal">thread_exit()</text>
</svg>
