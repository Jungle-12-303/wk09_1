<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="800" viewBox="0 0 1100 800"
     font-family="'Inter', 'JetBrains Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <style>
    .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
  </style>
  <rect width="1100" height="800" fill="#FFFFFF"/>
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CBD5E1"/>
    </marker>
  </defs>
  <text x="550" y="56" text-anchor="middle" font-size="28" font-weight="bold" fill="#191F28">스레드 생명 주기</text>
  <rect x="400" y="150" width="240" height="80" rx="16" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <text x="520" y="197" font-size="20" fill="#191F28" text-anchor="middle" font-weight="bold">READY</text>
  <rect x="80" y="380" width="240" height="80" rx="16" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="427" font-size="20" fill="#191F28" text-anchor="middle" font-weight="bold">BLOCKED</text>
  <rect x="780" y="380" width="240" height="80" rx="16" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <text x="900" y="427" font-size="20" fill="#191F28" text-anchor="middle" font-weight="bold">RUNNING</text>
  <rect x="400" y="620" width="240" height="80" rx="16" fill="#FFFFFF" stroke="#8B95A1" stroke-width="2" filter="url(#shadow)"/>
  <text x="520" y="667" font-size="20" fill="#191F28" text-anchor="middle" font-weight="bold">DYING</text>
  <text x="520" y="120" font-size="14" fill="#8B95A1" text-anchor="middle" font-weight="normal" class="mono">thread_create()</text>
  <line x1="520" y1="130" x2="520" y2="142" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 200,380 C 200,300 400,230 420,230" fill="none" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="120" y="320" font-size="14" fill="#8B95A1" text-anchor="start" font-weight="normal" class="mono">thread_unblock()</text>
  <rect x="120" y="332" width="80" height="24" rx="12" fill="#EFF6FF"/>
  <text x="160" y="348" font-size="12" fill="#1D4ED8" text-anchor="middle" font-weight="bold">Phase 1</text>
  <path d="M 640,190 C 720,190 900,300 900,380" fill="none" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="700" y="240" font-size="14" fill="#8B95A1" text-anchor="start" font-weight="normal" class="mono">schedule()</text>
  <rect x="700" y="246" width="80" height="24" rx="12" fill="#F0FDF4"/>
  <text x="740" y="262" font-size="12" fill="#15803D" text-anchor="middle" font-weight="bold">Phase 2</text>
  <path d="M 780,440 L 320,440" fill="none" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="550" y="424" font-size="14" fill="#8B95A1" text-anchor="middle" font-weight="normal" class="mono">sema_down()</text>
  <rect x="510" y="430" width="80" height="24" rx="12" fill="#FFF7ED"/>
  <text x="550" y="446" font-size="12" fill="#C2410C" text-anchor="middle" font-weight="bold">Phase 3</text>
  <path d="M 1000,380 C 1040,110 660,110 620,150" fill="none" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="830" y="95" font-size="14" fill="#8B95A1" text-anchor="middle" font-weight="normal" class="mono">thread_yield()</text>
  <rect x="790" y="102" width="80" height="24" rx="12" fill="#F0FDF4"/>
  <text x="830" y="118" font-size="12" fill="#15803D" text-anchor="middle" font-weight="bold">Phase 2</text>
  <path d="M 780,460 C 780,560 680,660 640,660" fill="none" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="740" y="552" font-size="14" fill="#8B95A1" text-anchor="start" font-weight="normal" class="mono">thread_exit()</text>
</svg>
