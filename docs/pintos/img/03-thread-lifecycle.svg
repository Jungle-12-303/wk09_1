<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="800" viewBox="0 0 1100 800"
     font-family="'Inter', 'JetBrains Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <style>
    .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
  </style>
  <rect width="1100" height="800" fill="#FFFFFF"/>
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CBD5E1"/>
    </marker>
  </defs>
  <text x="550" y="56" text-anchor="middle" font-size="28" font-weight="bold" fill="#191F28">스레드 생명 주기</text>
  <rect x="400" y="150" width="240" height="80" rx="16" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <text x="520" y="197" font-size="20" fill="#191F28" text-anchor="middle" font-weight="bold">READY</text>
  <rect x="80" y="380" width="240" height="80" rx="16" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="427" font-size="20" fill="#191F28" text-anchor="middle" font-weight="bold">BLOCKED</text>
  <rect x="780" y="380" width="240" height="80" rx="16" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <text x="900" y="427" font-size="20" fill="#191F28" text-anchor="middle" font-weight="bold">RUNNING</text>
  <rect x="400" y="620" width="240" height="80" rx="16" fill="#FFFFFF" stroke="#8B95A1" stroke-width="2" filter="url(#shadow)"/>
  <text x="520" y="667" font-size="20" fill="#191F28" text-anchor="middle" font-weight="bold">DYING</text>
  <text x="520" y="120" font-size="14" fill="#8B95A1" text-anchor="middle" font-weight="normal" class="mono">thread_create()</text>
  <line x1="520" y1="130" x2="520" y2="142" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 320,400 Q 334,340 408,222" fill="none" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="304.0" y="332" font-size="14" fill="#8B95A1" text-anchor="middle" font-weight="normal" class="mono">thread_unblock()</text>
  <rect x="254.0" y="336" width="80" height="24" rx="12" fill="#EFF6FF"/>
  <text x="294.0" y="352" font-size="12" fill="#1D4ED8" text-anchor="middle" font-weight="bold">Phase 1</text>
  <path d="M 640,210 Q 740,250 780,400" fill="none" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="760.0" y="242" font-size="14" fill="#8B95A1" text-anchor="middle" font-weight="normal" class="mono">schedule()</text>
  <rect x="710.0" y="246" width="80" height="24" rx="12" fill="#F0FDF4"/>
  <text x="750.0" y="262" font-size="12" fill="#15803D" text-anchor="middle" font-weight="bold">Phase 2</text>
  <path d="M 780,440 L 320,440" fill="none" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="550.0" y="418.0" font-size="14" fill="#8B95A1" text-anchor="middle" font-weight="normal" class="mono">sema_down()</text>
  <rect x="510.0" y="424.0" width="80" height="24" rx="12" fill="#FFF7ED"/>
  <text x="550.0" y="440.0" font-size="12" fill="#C2410C" text-anchor="middle" font-weight="bold">Phase 3</text>
  <path d="M 900,380 C 940,50 580,50 620,150" fill="none" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="760.0" y="40" font-size="14" fill="#8B95A1" text-anchor="middle" font-weight="normal" class="mono">thread_yield()</text>
  <rect x="710.0" y="46" width="80" height="24" rx="12" fill="#F0FDF4"/>
  <text x="750.0" y="62" font-size="12" fill="#15803D" text-anchor="middle" font-weight="bold">Phase 2</text>
  <path d="M 900,460 L 900,560.0 Q 900,660 640,660" fill="none" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="916" y="560.0" font-size="14" fill="#8B95A1" text-anchor="start" font-weight="normal" class="mono">thread_exit()</text>
</svg>
