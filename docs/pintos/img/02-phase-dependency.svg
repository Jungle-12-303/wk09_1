<svg viewBox="0 0 700 680" xmlns="http://www.w3.org/2000/svg" style="background:#fff">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; }
      .title { font-size: 20px; font-weight: bold; fill: #222; }
      .phase-name { font-size: 16px; font-weight: bold; fill: #fff; }
      .desc { font-size: 13px; fill: #333; }
      .output { font-size: 12px; fill: #666; font-style: italic; }
      .dep { font-size: 11px; fill: #888; }
    </style>
  </defs>
  <text x="350" y="35" text-anchor="middle" class="title">Phase 의존 관계</text>

  <!-- Phase 1 -->
  <rect x="150" y="60" width="400" height="100" rx="16" fill="#1565C0"/>
  <text x="350" y="90" text-anchor="middle" class="phase-name">Phase 1: Alarm Clock</text>
  <text x="350" y="115" text-anchor="middle" font-size="13" fill="#BBDEFB">timer_sleep() 재구현 - busy wait 제거</text>
  <text x="350" y="140" text-anchor="middle" font-size="12" fill="#90CAF9">핵심 산출물: sleep_list + thread_awake()</text>

  <!-- Arrow 1->2 -->
  <line x1="350" y1="160" x2="350" y2="195" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="365" y="182" class="dep">sleep_list 정렬 경험</text>

  <!-- Phase 2 -->
  <rect x="150" y="200" width="400" height="100" rx="16" fill="#2E7D32"/>
  <text x="350" y="230" text-anchor="middle" class="phase-name">Phase 2: Priority Scheduling</text>
  <text x="350" y="255" text-anchor="middle" font-size="13" fill="#C8E6C9">ready_list 우선순위 정렬</text>
  <text x="350" y="280" text-anchor="middle" font-size="12" fill="#A5D6A7">핵심 산출물: cmp_priority() + 선점 로직</text>

  <!-- Arrow 2->3 -->
  <line x1="350" y1="300" x2="350" y2="335" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="365" y="322" class="dep">우선순위 비교 함수 재사용</text>

  <!-- Phase 3 -->
  <rect x="150" y="340" width="400" height="100" rx="16" fill="#E65100"/>
  <text x="350" y="370" text-anchor="middle" class="phase-name">Phase 3: Priority Donation</text>
  <text x="350" y="395" text-anchor="middle" font-size="13" fill="#FFE0B2">lock 경쟁 시 우선순위 기부(donate)</text>
  <text x="350" y="420" text-anchor="middle" font-size="12" fill="#FFCC80">핵심 산출물: donate_priority() + nested donation</text>

  <!-- Arrow 3->4 -->
  <line x1="350" y1="440" x2="350" y2="475" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="365" y="462" class="dep">donation 비활성화 (MLFQS 모드)</text>

  <!-- Phase 4 -->
  <rect x="150" y="480" width="400" height="120" rx="16" fill="#7B1FA2"/>
  <text x="350" y="510" text-anchor="middle" class="phase-name">Phase 4: MLFQS</text>
  <text x="350" y="535" text-anchor="middle" font-size="13" fill="#E1BEE7">우선순위 자동 계산 (nice, recent_cpu, load_avg)</text>
  <text x="350" y="555" text-anchor="middle" font-size="12" fill="#CE93D8">핵심 산출물: 고정소수점 연산 + 자동 우선순위</text>
  <text x="350" y="580" text-anchor="middle" font-size="11" fill="#BA68C8">thread_mlfqs 플래그로 Phase 2/3 과 분기</text>

  <!-- Note -->
  <rect x="150" y="630" width="400" height="35" rx="6" fill="#F5F5F5" stroke="#CCC"/>
  <text x="350" y="653" text-anchor="middle" font-size="12" fill="#666">각 Phase는 이전 Phase의 구현을 전제로 한다</text>
</svg>