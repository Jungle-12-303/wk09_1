<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="820" viewBox="0 0 1000 820"
     font-family="'Inter', 'JetBrains Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <style>
    .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
  </style>
  <rect width="1000" height="820" fill="#FFFFFF"/>
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CBD5E1"/>
    </marker>
  </defs>
  <text x="500" y="56" text-anchor="middle" font-size="28" font-weight="bold" fill="#191F28">Phase 의존 관계</text>
  <rect x="150" y="100" width="700" height="110" rx="16" fill="#FFFFFF" stroke="#F2F4F6" stroke-width="1" filter="url(#shadow)"/>
  <rect x="180" y="120" width="80" height="24" rx="12" fill="#EFF6FF"/>
  <text x="220" y="136" font-size="12" fill="#1D4ED8" text-anchor="middle" font-weight="bold">Phase 1</text>
  <text x="272" y="136" font-size="20" fill="#191F28" text-anchor="start" font-weight="bold">Alarm Clock</text>
  <text x="180" y="172" font-size="16" fill="#333D4B" text-anchor="start" font-weight="normal">timer_sleep 재구현, sleep_list 도입</text>
  <rect x="150" y="270" width="700" height="110" rx="16" fill="#FFFFFF" stroke="#F2F4F6" stroke-width="1" filter="url(#shadow)"/>
  <rect x="180" y="290" width="80" height="24" rx="12" fill="#F0FDF4"/>
  <text x="220" y="306" font-size="12" fill="#15803D" text-anchor="middle" font-weight="bold">Phase 2</text>
  <text x="272" y="306" font-size="20" fill="#191F28" text-anchor="start" font-weight="bold">Priority Scheduling</text>
  <text x="180" y="342" font-size="16" fill="#333D4B" text-anchor="start" font-weight="normal">ready_list 우선순위 정렬, 선점 체크</text>
  <rect x="150" y="440" width="700" height="110" rx="16" fill="#FFFFFF" stroke="#F2F4F6" stroke-width="1" filter="url(#shadow)"/>
  <rect x="180" y="460" width="80" height="24" rx="12" fill="#FFF7ED"/>
  <text x="220" y="476" font-size="12" fill="#C2410C" text-anchor="middle" font-weight="bold">Phase 3</text>
  <text x="272" y="476" font-size="20" fill="#191F28" text-anchor="start" font-weight="bold">Priority Donation</text>
  <text x="180" y="512" font-size="16" fill="#333D4B" text-anchor="start" font-weight="normal">lock에서 우선순위 기부/회수</text>
  <rect x="150" y="610" width="700" height="110" rx="16" fill="#FFFFFF" stroke="#F2F4F6" stroke-width="1" filter="url(#shadow)"/>
  <rect x="180" y="630" width="80" height="24" rx="12" fill="#FAF5FF"/>
  <text x="220" y="646" font-size="12" fill="#7E22CE" text-anchor="middle" font-weight="bold">Phase 4</text>
  <text x="272" y="646" font-size="20" fill="#191F28" text-anchor="start" font-weight="bold">MLFQS</text>
  <text x="180" y="682" font-size="16" fill="#333D4B" text-anchor="start" font-weight="normal">nice, recent_cpu, load_avg로 자동 계산</text>
  <line x1="500" y1="210" x2="500" y2="262" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="380" x2="500" y2="432" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="550" x2="500" y2="602" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
